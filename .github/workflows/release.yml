name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            zig_target: x86_64-linux-gnu.2.17
          - os: ubuntu-24.04-arm
            arch: aarch64
            zig_target: aarch64-linux-gnu.2.17
          - os: macos-13
            arch: x86_64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: "0.17.0-dev.242+5d55999d2"

      # Pre-build the shared library and copy it into the Python package so that
      # hatchling picks it up without needing zig inside pip's build isolation.
      - name: Pre-build shared library (Linux — target glibc 2.17 for manylinux)
        if: runner.os == 'Linux'
        run: |
          zig build lib -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}
          cp zig-out/lib/libhypergraphz.so python/hypergraphz/

      - name: Pre-build shared library (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          zig build lib -Doptimize=ReleaseFast
          cp zig-out/lib/libhypergraphz.so python/hypergraphz/ 2>/dev/null || \
          cp zig-out/lib/libhypergraphz.dylib python/hypergraphz/ 2>/dev/null || \
          cp zig-out/lib/hypergraphz.dll python/hypergraphz/ 2>/dev/null || true

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp311-manylinux_${{ matrix.arch }}"
          CIBW_ARCHS: ${{ matrix.arch }}

      - name: Build wheels (macOS / Windows)
        if: runner.os != 'Linux'
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp311-*"
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Retag wheels to py3-none
        shell: bash
        run: |
          uv run python -m wheel tags \
            --python-tag py3 \
            --abi-tag none \
            --remove \
            wheelhouse/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
