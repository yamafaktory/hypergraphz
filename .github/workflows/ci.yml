name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: "0.17.0-dev.13+113f79a1"
      - run: zig fmt --check src/ build.zig tests/ examples/
      - run: zig build check
      - run: zig build test --summary all
